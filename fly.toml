app = "sheffield"
primary_region = "ams"

[build]

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  APP_URL = "https://sheffield.fly.dev"
  LOG_CHANNEL = "stderr"
  LOG_LEVEL = "info"
  LOG_STDERR_FORMATTER = "Monolog\\Formatter\\JsonFormatter"
  DB_CONNECTION = "sqlite"
  DB_DATABASE = "/data/database.sqlite"
  SESSION_DRIVER = "database"
  CACHE_STORE = "database"
  QUEUE_CONNECTION = "database"
  FILESYSTEM_DISK = "local"

[[mounts]]
  source = "sheffield_data"
  destination = "/data"
  initial_size = "1gb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/up"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
